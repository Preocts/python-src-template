name: "python tests and coverage"
# Uses:
# https://github.com/actions/checkout : v6.0.2 de0fac2e4500dabe0009e67214ff5f5447ce83dd
# https://github.com/actions/download-artifact : v8.0.1 3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
# https://github.com/actions/upload-artifact : v7.0.0 bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
# https://github.com/astral-sh/setup-uv : v7.5.0 e06108dd0aef18192324c70427afc47652e63a82

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  run-tests-and-coverage:
    name: "Run nox for tests and coverage"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os:
          # - "macos-latest"
          # - "windows-latest"
          - "ubuntu-latest"
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: "Repo checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"

      - name: "Install the latest version of uv"
        uses: "astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82"
        with:
          version: "latest"
          python-version: "${{ matrix.python-version }}"
          enable-cache: true

      - name: "Run tests and coverage via nox"
        run: "uvx nox --session test -- partial-coverage"

      - name: "Save coverage artifact"
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: "coverage-artifact-${{ matrix.os}}-${{ matrix.python-version}}"
          path: ".coverage.*"
          retention-days: 1
          include-hidden-files: true

  coverage-compile:
    name: "coverage compile"
    needs: "run-tests-and-coverage"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Repo checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"

      - name: "Install the latest version of uv"
        uses: "astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82"
        with:
          version: "latest"
          enable-cache: true

      - name: "Download coverage artifacts"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c"
        with:
          pattern: "coverage-artifact-*"
          merge-multiple: true

      - name: "Compile coverage data"
        run: "uvx nox --session combine"

      - name: "Post summary to step summary"
        run: |
          export COVERAGE_REQUIRED=$(<.required-coverage)
          export TOTAL=$(python -c "import json;print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "### Minimum coverage required: ${COVERAGE_REQUIRED}%" >> $GITHUB_STEP_SUMMARY
          echo "### Total coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY
          if [ ${COVERAGE_REQUIRED} -gt $TOTAL ]; then
            exit 1
          fi

  linters-and-formatters:
    name: "linters and formatters"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Repo checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"

      - name: "Install the latest version of uv"
        uses: "astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82"
        with:
          version: "latest"
          enable-cache: true

      - name: "Run linters and formatters"
        run: "uvx nox --session format lint"

      - name: "Check for any unstaged changes"
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "#### Format or Lint changes found. Please run 'uvx nox' locally and push the changes." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
